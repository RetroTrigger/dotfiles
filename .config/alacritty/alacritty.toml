[window]
opacity = 0.35
padding.x = 8
padding.y = 8
decorations = "None"

[font]
normal.family = "Noto Sans Mono"
size = 11.0

[colors]
# Tokyo Night
[colors.primary]
background = "#000000"
foreground = "#c0caf5"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[colors.cursor]
cursor = "#c0caf5"
text   = "#000000"

[colors.selection]
background = "#283457"
text       = "CellForeground"

[cursor]
style.shape = "Block"
unfocused_hollow = true
